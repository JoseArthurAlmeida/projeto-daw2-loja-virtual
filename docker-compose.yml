version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: projeto-daw2-db
    restart: always
    environment:
      POSTGRES_DB: loja_virtual_daw2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: